<ion-content class="ion-padding" color="primary">
  <ion-grid
    style="
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
    "
  >
    <ion-row class="ion-justify-content-center">
      <ion-col size="12" size-sm="8" size-md="6" size-lg="4" size-xl="4">
        <ion-card class="ion-padding-vertical">
          <ion-grid>
            <ion-row class="ion-justify-content-center">
              <ion-col size="6" size-sm="5" class="ion-text-center">
                <ion-img
                  [src]="'assets/images/logo_fvf.png'"
                  class="z-1"
                ></ion-img>
              </ion-col>
            </ion-row>

            <ion-row>
              <ion-col size="12" class="ion-text-center ion-padding-horizontal">
                <h3 color="primary">
                  Inicio de sesión Sistema MatchdayPro FVF
                </h3>
              </ion-col>
            </ion-row>
          </ion-grid>

          <form [formGroup]="form">
            <ion-grid class="ion-padding-horizontal">
              <ion-row class="ion-justify-content-center">
                @if (errorMessage()) {
                <div class="alert-error mb-4 text-center text-danger">
                  {{ errorMessage() }}
                </div>
                }
                <ion-col size="12" size-sm="10" size-md="8">
                  <ion-button
                    expand="block"
                    type="submit"
                    color="primary"
                    class="ion-margin-top"
                    (click)="loginWithGoogle()"
                  >
                    {{ isLoading() ? "Cargando..." : "Iniciar Sesión" }}
                  </ion-button>
                </ion-col>
              </ion-row>
            </ion-grid>
          </form>
        </ion-card>
      </ion-col>
    </ion-row>
  </ion-grid>
</ion-content>
