<ion-app>
  <ion-split-pane contentId="main-content" [when]="mostrarMenu ? 'md' : false">
    <ion-menu contentId="main-content" type="overlay" [disabled]="!mostrarMenu">
      <ion-content>
        <ion-list id="inbox-list">
          <div class="menu-header">
            <img
              src="assets/images/logo_fvf.png"
              alt="Logo FVF"
              class="menu-logo"
            />
            <h2 class="menu-title">MatchdayPro FVF</h2>
          </div>

          @for (p of appPages; track p; let i = $index) {
            <ion-menu-toggle auto-hide="false">
              <ion-item
                routerDirection="root"
                [routerLink]="[p.url]"
                lines="none"
                detail="false"
                routerLinkActive="selected"
              >
                <ion-icon
                  aria-hidden="true"
                  slot="start"
                  [ios]="p.icon + '-outline'"
                  [md]="p.icon + '-sharp'"
                ></ion-icon>
                <ion-label>{{ p.title }}</ion-label>
              </ion-item>
            </ion-menu-toggle>
          }
        </ion-list>
      </ion-content>
    </ion-menu>
    <ion-router-outlet id="main-content"></ion-router-outlet>
  </ion-split-pane>
</ion-app>
